# YanOS Release Workflow
# 1. GitHub runner: 构建 yanctl 多平台二进制 → GitHub Release
# 2. Self-hosted VPS (SSH): 生成 ISO → 上传对象存储
#
# 触发: push v* tag 或手动 workflow_dispatch
# Tag 规范: v<upstream>-yanos.<patch>, e.g. v1.13.4-yanos.1

name: yanos-release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.13.4-yanos.1)"
        required: true

env:
  REGISTRY: ghcr.io
  USERNAME: erhuoyan

jobs:
  # ─── Job 1: 构建 yanctl (GitHub 免费 runner) ────────────────────────
  yanctl:
    name: Build yanctl (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          SHA=$(git rev-parse --short=8 HEAD)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Inject gendata
        run: |
          mkdir -p pkg/machinery/gendata/data
          echo -n "YanOS"                    > pkg/machinery/gendata/data/name
          echo -n "${{ steps.version.outputs.tag }}" > pkg/machinery/gendata/data/tag
          echo -n "${{ steps.version.outputs.sha }}" > pkg/machinery/gendata/data/sha
          echo -n "${{ env.USERNAME }}"      > pkg/machinery/gendata/data/username
          echo -n "${{ env.REGISTRY }}"      > pkg/machinery/gendata/data/registry

      - name: Build yanctl
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="yanctl-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -tags grpcnotrace -ldflags "-s -w" \
            -o "_out/${BINARY}" ./cmd/yanctl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: _out/yanctl-*

  # ─── Job 2: 生成 ISO (SSH 到 VPS) ──────────────────────────────────
  iso:
    name: Build ISO (VPS)
    runs-on: ubuntu-24.04
    steps:
      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          UPSTREAM="${TAG%%-yanos*}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build ISO on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          TAG: ${{ steps.version.outputs.tag }}
          UPSTREAM: ${{ steps.version.outputs.upstream }}
        run: |
          ssh root@${VPS_HOST} bash << REMOTE
          set -euo pipefail
          export PATH=/usr/local/go/bin:/usr/local/bin:\$PATH

          cd /root/yanos
          git fetch --tags
          git checkout main
          git pull

          # Inject gendata
          mkdir -p pkg/machinery/gendata/data
          echo -n "YanOS"    > pkg/machinery/gendata/data/name
          echo -n "${TAG}"   > pkg/machinery/gendata/data/tag
          echo -n "\$(git rev-parse --short=8 HEAD)" > pkg/machinery/gendata/data/sha
          echo -n "erhuoyan" > pkg/machinery/gendata/data/username
          echo -n "hub-vpc.jdcloud.com" > pkg/machinery/gendata/data/registry

          # Build yanctl for VPS (linux/amd64)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -tags grpcnotrace -ldflags "-s -w" \
            -o _out/yanctl-linux-amd64 ./cmd/yanctl

          # Generate ISO
          IMAGER_IMAGE="hub-vpc.jdcloud.com/iaas-jf/siderolabs/imager:${UPSTREAM}"
          docker pull "\${IMAGER_IMAGE}"
          docker run --rm -t -v /root/yanos/_out:/out "\${IMAGER_IMAGE}" \
            metal --arch amd64 --output-kind iso

          # Rename with tag
          mv _out/metal-amd64.iso "_out/yanos-${TAG}-amd64.iso"

          # Checksums
          cd _out
          sha256sum "yanos-${TAG}-amd64.iso" yanctl-linux-amd64 > "sha256sum-${TAG}.txt"

          # Upload to object storage
          mc cp "yanos-${TAG}-amd64.iso"   yxh-oss/gengyan15/yanos/releases/${TAG}/
          mc cp yanctl-linux-amd64         yxh-oss/gengyan15/yanos/releases/${TAG}/
          mc cp "sha256sum-${TAG}.txt"     yxh-oss/gengyan15/yanos/releases/${TAG}/

          echo "=== Upload complete ==="
          mc ls yxh-oss/gengyan15/yanos/releases/${TAG}/
          REMOTE

      - name: Get ISO download URL
        id: iso_url
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # 获取对象存储的外部下载地址（如有公开读权限）
          echo "oss_path=yxh-oss/gengyan15/yanos/releases/${TAG}/" >> "$GITHUB_OUTPUT"

  # ─── Job 3: 创建 GitHub Release ────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: [yanctl, iso]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download yanctl artifacts
        uses: actions/download-artifact@v4
        with:
          path: _out
          merge-multiple: true

      - name: Generate checksums
        working-directory: _out
        run: sha256sum yanctl-* > sha256sum.txt

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          UPSTREAM="${TAG%%-yanos*}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            _out/yanctl-*
            _out/sha256sum.txt
          body: |
            ## YanOS ${{ steps.version.outputs.tag }}

            基于上游 Talos Linux `${{ steps.version.outputs.upstream }}` 稳定版本。

            ### yanctl 安装

            ```bash
            # Linux amd64
            curl -LO https://github.com/erhuoyan/yanos/releases/download/${{ steps.version.outputs.tag }}/yanctl-linux-amd64
            chmod +x yanctl-linux-amd64
            sudo mv yanctl-linux-amd64 /usr/local/bin/yanctl

            # macOS Apple Silicon
            curl -LO https://github.com/erhuoyan/yanos/releases/download/${{ steps.version.outputs.tag }}/yanctl-darwin-arm64
            chmod +x yanctl-darwin-arm64
            sudo mv yanctl-darwin-arm64 /usr/local/bin/yanctl
            ```

            ### ISO 下载

            ISO 存放在对象存储:
            ```
            路径: yxh-oss/gengyan15/yanos/releases/${{ steps.version.outputs.tag }}/
            文件: yanos-${{ steps.version.outputs.tag }}-amd64.iso
            ```
