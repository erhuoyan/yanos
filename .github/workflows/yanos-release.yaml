# YanOS Release Workflow
# Builds yanctl (multi-platform) on tag push. Creates a draft GitHub Release.
# Does NOT require Siderolabs' self-hosted runners or remote buildkit.
#
# Strategy: track upstream stable releases (e.g. v1.13.x).
# YanOS tags follow: v<upstream>-yanos.<patch>, e.g. v1.13.4-yanos.1

name: yanos-release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.13.4-yanos.1)"
        required: true

env:
  REGISTRY: ghcr.io
  USERNAME: erhuoyan

jobs:
  yanctl:
    name: Build yanctl (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          SHA=$(git rev-parse --short=8 HEAD)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Inject gendata
        run: |
          mkdir -p pkg/machinery/gendata/data
          echo -n "YanOS"                    > pkg/machinery/gendata/data/name
          echo -n "${{ steps.version.outputs.tag }}" > pkg/machinery/gendata/data/tag
          echo -n "${{ steps.version.outputs.sha }}" > pkg/machinery/gendata/data/sha
          echo -n "${{ env.USERNAME }}"      > pkg/machinery/gendata/data/username
          echo -n "${{ env.REGISTRY }}"      > pkg/machinery/gendata/data/registry

      - name: Build yanctl
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="yanctl-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -tags grpcnotrace -ldflags "-s -w" \
            -o "_out/${BINARY}" ./cmd/yanctl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: _out/yanctl-*

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: [yanctl]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _out
          merge-multiple: true

      - name: Generate checksums
        working-directory: _out
        run: |
          sha256sum yanctl-* > sha256sum.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            _out/yanctl-*
            _out/sha256sum.txt
          body: |
            ## YanOS ${{ github.ref_name }}

            基于上游 Talos Linux 稳定版本构建。

            ### 安装

            ```bash
            # Linux amd64
            curl -LO https://github.com/erhuoyan/yanos/releases/download/${{ github.ref_name }}/yanctl-linux-amd64
            chmod +x yanctl-linux-amd64
            sudo mv yanctl-linux-amd64 /usr/local/bin/yanctl

            # macOS Apple Silicon
            curl -LO https://github.com/erhuoyan/yanos/releases/download/${{ github.ref_name }}/yanctl-darwin-arm64
            chmod +x yanctl-darwin-arm64
            sudo mv yanctl-darwin-arm64 /usr/local/bin/yanctl
            ```

            ### 生成系统镜像 (ISO)

            使用上游 Talos Image Factory 或自建：
            ```bash
            # 方式1: 使用上游 imager 镜像生成 ISO
            docker run --rm -t -v $(pwd)/_out:/out \
              ghcr.io/siderolabs/imager:v1.13.4 \
              iso --output-kind iso

            # 方式2: 使用 Talos Image Factory Web UI
            # https://factory.talos.dev
            ```
